<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css">
  <link rel="stylesheet" href="css/style.css">
  <title>INFO | Harvest Restaurant</title>
</head>

<body>
  <div class="work-container">
    <div class="work-fv">
      <div class="trigger">
        <img src="images/serame1.jpg" alt="Hero Image">
      </div>
      <div class="modal">
        <span class="close">&times;</span>
        <img src="images/serame.jpg" alt="Hero Image">
      </div>
    </div>
    <div class=" work-inner">
      <h1 class="work-title">美容液LP</h1>
      <div class="work-section">
        <p>20~30代の女性をターゲットにした美容液のLPを制作。
          集客と予約導線の強化を目的としました。
        </p>
      </div>
      <div class="work-section">
        <h2> デザイン意図</h2>
        <p>安心感と清潔感を意識し、余白を広く取り、柔らかい配色で構成しました。</p>
      </div>
      <div class="work-section">
        <h2>使用スキル</h2>
        <ul>
          <li>Photoshop</li>
          <li>Illustrator</li>
          <li>HTML</li>
          <li>CSS</li>
        </ul>
      </div>
      <div class="work-section">
        <h2>工夫した点</h2>
        <p>ファーストビューで訴求が伝わるようにキャッチコピーを大きく配置し、
          CTAボタンを目立たせることで、ユーザーの行動を促す設計にしました。
        </p>
      </div>
    </div>
  </div>
  <script src="js/script.js" defer></script>
</body>

</html>
